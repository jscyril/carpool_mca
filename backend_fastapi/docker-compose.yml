version: "3.9"

services:
  api:
    build: .
    container_name: uniride_api
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
